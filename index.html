<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/eduroute-logo.png" />
    <link rel="apple-touch-icon" href="/eduroute-logo-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eduroute</title>
  </head>
  <body>
    <script>
      window.deferredPrompt = null;
      console.log('Early PWA script loaded');
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('beforeinstallprompt fired! App is installable');
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new Event('deferredpromptready'));
      });
      window.addEventListener('appinstalled', () => {
        console.log('App was installed successfully');
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/eduroute_frontend/main.jsx"></script>
  </body>
</html>
